<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>부기 피하기</title>
  <style>
    html, body { margin:0; height:100%; background:#f7f7fb; }
    body { display:grid; grid-template-rows: 1fr auto; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif; }
    #stage { display:grid; place-items:center; width:100%; height:100%; }
    canvas { background:#fff; border-radius:16px; box-shadow:0 8px 24px rgba(0,0,0,.08); touch-action:none; }
    #controls { position:sticky; bottom:0; width:100%; display:grid; grid-template-columns: 1fr 1fr; gap:8px;
      padding: env(safe-area-inset-bottom) 12px 12px 12px;
      background:linear-gradient(180deg, rgba(247,247,251,0), rgba(247,247,251,.85) 40%, rgba(247,247,251,1));
      backdrop-filter:saturate(1.2) blur(6px);
    }
    .btn { -webkit-tap-highlight-color: transparent; user-select:none; text-align:center; border-radius:14px;
      padding:14px 12px; font-weight:700; font-size:18px; background:#eef1ff; border:2px solid #dde3ff; box-shadow:inset 0 -2px 0 rgba(0,0,0,.06);}
    .btn:active, .btn.active { transform:translateY(1px); background:#e1e6ff; }
    #overlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center;
      background:rgba(0,0,0,.35); z-index:10; padding:16px; }
    #overlayCard { width:min(420px, 92vw); background:#fff; border-radius:16px; box-shadow:0 16px 40px rgba(0,0,0,.25);
      padding:20px; text-align:center; }
    #overlay h1 { margin:4px 0 10px; font-size:24px; }
    #overlay p  { margin:6px 0; color:#333; }
    #startBtn { margin-top:14px; width:100%; padding:14px 12px; font-weight:800; font-size:18px; border-radius:12px;
      background:#e6fff2; border:2px solid #c9f9df; }
    #stats { font-size:15px; color:#555; line-height:1.5; }
    /* JS 로드 실패 시 메시지 영역 */
    #bootError { position:fixed; inset:0; display:none; place-items:center; background:#fff; color:#000; z-index:9999; padding:20px; }
    #bootError pre { white-space:pre-wrap; word-break:break-all; }
  </style>
  <script>
    // 외부 JS 로드 실패 시 사용자에게 바로 표시
    function __gameJsError() {
      var el = document.getElementById('bootError');
      el.style.display = 'grid';
      el.querySelector('pre').textContent = 'game.js 로드 실패. 파일명/경로 확인.\n(예: index.html과 같은 폴더에 game.js 놓기)\n';
    }
  </script>
  <script src="game.js?v=1" defer onerror="__gameJsError()"></script>
</head>
<body>
  <div id="stage">
    <canvas id="gameCanvas" width="400" height="600" aria-label="game canvas"></canvas>
  </div>

  <div id="controls">
    <button id="btnLeft"  class="btn" aria-label="왼쪽">◀ 왼쪽</button>
    <button id="btnRight" class="btn" aria-label="오른쪽">오른쪽 ▶</button>
  </div>

  <div id="overlay">
    <div id="overlayCard">
      <h1 id="overlayTitle">게임 시작</h1>
      <p id="overlayMsg">왼쪽/오른쪽을 눌러서 부기를 움직이세요.</p>
      <div id="stats" style="display:none"></div>
      <button id="startBtn">게임 시작</button>
    </div>
  </div>

  <!-- 부트 에러 표시 레이어 -->
  <div id="bootError"><pre></pre></div>
</body>
</html>
